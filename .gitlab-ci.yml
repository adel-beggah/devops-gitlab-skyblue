# =============================================================================
#  Pipeline CI/CD — SkyBlue IT Limited  (application FastAPI)
#  Cible : GitLab.com + RUNNER AUTO-HÉBERGÉ (exécuteur shell) installé sur la
#  machine qui héberge le cluster Kubernetes — montage identique au cours
#  DataScientest (le runner et le cluster sont sur la même machine).
#
#  Le runner (tag "skyblue-local") tourne sous l'utilisateur qui dispose de :
#    - Docker (colima) déjà authentifié sur DockerHub (docker login)
#    - kubectl/helm + le kubeconfig du cluster kind (contexte kind-skyblue)
#
#  Environnements : dev (auto) | qa (auto) | staging (auto) | prod (manuel, main)
#
#  ÉQUIVALENT CLOUD (gitlab.com shared runners + cluster cloud) : on utiliserait
#  image:/services: docker:dind, un "docker login" via les variables CI
#  DOCKERHUB_USER/DOCKERHUB_TOKEN, et la variable de type File KUBE_CONFIG.
# =============================================================================

default:
  tags:
    - skyblue-local            # s'exécute sur notre runner auto-hébergé

variables:
  IMAGE_NAME: "adel75/fastapi" # dépôt DockerHub
  KUBE_CONTEXT: "kind-skyblue" # contexte du cluster local
  NODEPORT_DEV: "30000"
  NODEPORT_QA: "30001"
  NODEPORT_STAGING: "30002"
  NODEPORT_PROD: "30003"
  CLUSTER_IP: "localhost"

stages:
  - test
  - build
  - push
  - deploy_dev
  - deploy_qa
  - deploy_staging
  - deploy_prod

# -----------------------------------------------------------------------------
# 1) TEST : tests unitaires FastAPI (venv isolé)
#    httpx épinglé <0.28 (0.28 supprime le paramètre app= -> casse le TestClient
#    de Starlette 0.22) ; pytest lancé depuis la racine (import relatif .main).
# -----------------------------------------------------------------------------
test:
  stage: test
  script:
    - python3 -m venv .venv && . .venv/bin/activate
    - pip install --quiet --upgrade pip
    - pip install --quiet -r requirements.txt
    - pip install --quiet pytest "httpx<0.28"
    - python -m pytest app/ -v

# -----------------------------------------------------------------------------
# 2) BUILD : construit l'image, taguée avec le SHA court du commit + latest
# -----------------------------------------------------------------------------
build:
  stage: build
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" -t "$IMAGE_NAME:latest" .

# -----------------------------------------------------------------------------
# 3) PUSH : publie l'image sur DockerHub (le runner est déjà authentifié)
#    latest n'est poussé que depuis main.
# -----------------------------------------------------------------------------
push:
  stage: push
  script:
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - if [ "$CI_COMMIT_BRANCH" = "main" ]; then docker push "$IMAGE_NAME:latest"; fi

# -----------------------------------------------------------------------------
# Déploiement Helm réutilisable. helm upgrade --install (idempotent) dans le
# namespace cible ; l'image publique est tirée depuis DockerHub par le cluster.
# -----------------------------------------------------------------------------
.deploy_template: &deploy_template
  script:
    - >
      helm upgrade --install fastapi ./fastapi
      --kube-context "$KUBE_CONTEXT"
      --namespace "$NAMESPACE"
      --values ./fastapi/values-$NAMESPACE.yaml
      --set image.repository="$IMAGE_NAME"
      --set image.tag="$CI_COMMIT_SHORT_SHA"
      --set service.nodeport="$NODEPORT"
      --wait --timeout 120s
    - kubectl --context "$KUBE_CONTEXT" -n "$NAMESPACE" rollout status deploy/fastapi --timeout=120s

# -----------------------------------------------------------------------------
# 4) DÉPLOIEMENTS automatiques : dev -> qa -> staging
# -----------------------------------------------------------------------------
deploy_dev:
  <<: *deploy_template
  stage: deploy_dev
  variables: { NAMESPACE: dev, NODEPORT: "30000" }
  environment:
    name: dev
    url: http://$CLUSTER_IP:$NODEPORT_DEV

deploy_qa:
  <<: *deploy_template
  stage: deploy_qa
  variables: { NAMESPACE: qa, NODEPORT: "30001" }
  environment:
    name: qa
    url: http://$CLUSTER_IP:$NODEPORT_QA

deploy_staging:
  <<: *deploy_template
  stage: deploy_staging
  variables: { NAMESPACE: staging, NODEPORT: "30002" }
  environment:
    name: staging
    url: http://$CLUSTER_IP:$NODEPORT_STAGING

# -----------------------------------------------------------------------------
# 5) DÉPLOIEMENT PRODUCTION : MANUEL et UNIQUEMENT sur la branche main
# -----------------------------------------------------------------------------
deploy_prod:
  <<: *deploy_template
  stage: deploy_prod
  variables: { NAMESPACE: prod, NODEPORT: "30003" }
  environment:
    name: prod
    url: http://$CLUSTER_IP:$NODEPORT_PROD
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
