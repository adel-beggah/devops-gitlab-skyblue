# =============================================================================
#  Pipeline CI/CD — SkyBlue IT Limited
#  Application FastAPI -> image DockerHub -> déploiement Helm sur Kubernetes
#  Environnements : dev (auto) | qa (auto) | staging (auto) | prod (manuel, main)
# =============================================================================

variables:
  # --- Registre DockerHub -----------------------------------------------------
  # IMAGE_NAME doit pointer vers votre dépôt DockerHub : <user>/fastapi
  # DOCKERHUB_USER / DOCKERHUB_TOKEN sont définis dans Settings > CI/CD > Variables
  IMAGE_NAME: "$DOCKERHUB_USER/fastapi"
  # --- Namespaces / NodePorts par environnement -------------------------------
  KUBE_NAMESPACE_DEV: dev
  KUBE_NAMESPACE_QA: qa
  KUBE_NAMESPACE_STAGING: staging
  KUBE_NAMESPACE_PROD: prod
  NODEPORT_DEV: 30000
  NODEPORT_QA: 30001
  NODEPORT_STAGING: 30002
  NODEPORT_PROD: 30003
  # IP publique du/des nœud(s) du cluster (pour les URLs d'environnement)
  CLUSTER_IP: "127.0.0.1"   # <-- remplacer par l'IP de votre VM/cluster

stages:
  - test
  - build
  - run
  - push
  - deploy_dev
  - deploy_qa
  - deploy_staging
  - deploy_prod

# -----------------------------------------------------------------------------
# 1) TEST : tests unitaires de l'application FastAPI (pytest)
#    - on installe les deps de l'app + pytest
#    - httpx est ÉPINGLÉ <0.28 : httpx 0.28 a supprimé le paramètre `app=`,
#      ce qui casse le TestClient de Starlette 0.22 (vérifié réellement).
#    - pytest est lancé DEPUIS LA RACINE : le test fait `from .main import app`
#      (import relatif), donc `app` doit rester un package -> `python -m pytest app/`.
#      (La variante `cd app/ && pytest` du TP échoue sur cet import relatif.)
# -----------------------------------------------------------------------------
test:
  stage: test
  image: python:3.9
  before_script:
    - pip install --no-cache-dir -r requirements.txt
    - pip install --no-cache-dir pytest "httpx<0.28"
  script:
    - python -m pytest app/ -v

# -----------------------------------------------------------------------------
# 2) BUILD : construction de l'image Docker, taguée avec le SHA court du commit
# -----------------------------------------------------------------------------
build:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" -t "$IMAGE_NAME:latest" .
    # Sauvegarde de l'image pour la passer au stage suivant
    - docker save "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour

# -----------------------------------------------------------------------------
# 3) RUN : démarre l'image et vérifie un HTTP 200 sur "/" (test fumée)
# -----------------------------------------------------------------------------
run:
  stage: run
  image: docker:24.0
  services:
    - docker:24.0-dind
  script:
    - docker load < image.tar
    - docker run -d -p 80:80 --name fastapi "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - sleep 8
    - apk add --no-cache curl
    - 'curl -sf -o /dev/null -w "HTTP %{http_code}\n" http://docker:80/ || curl -sf -o /dev/null -w "HTTP %{http_code}\n" http://localhost:80/'
    - docker rm -f fastapi

# -----------------------------------------------------------------------------
# 4) PUSH : authentification DockerHub et publication de l'image
# -----------------------------------------------------------------------------
push:
  stage: push
  image: docker:24.0
  services:
    - docker:24.0-dind
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
  script:
    - docker load < image.tar
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    # Le tag latest n'est poussé que depuis la branche principale
    - if [ "$CI_COMMIT_BRANCH" = "main" ]; then docker tag "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$IMAGE_NAME:latest"; docker push "$IMAGE_NAME:latest"; fi

# -----------------------------------------------------------------------------
# Template de déploiement Helm réutilisé par chaque environnement.
#   - récupère le kubeconfig depuis la variable de type File KUBE_CONFIG
#   - helm upgrade --install (idempotent) dans le namespace cible
# -----------------------------------------------------------------------------
.deploy_template: &deploy_template
  image: dtzar/helm-kubectl:3.14
  before_script:
    - mkdir -p ~/.kube
    - cp "$KUBE_CONFIG" ~/.kube/config
    - export KUBECONFIG=~/.kube/config
  script:
    - >
      helm upgrade --install fastapi ./fastapi
      --namespace "$NAMESPACE"
      --values ./fastapi/values-$NAMESPACE.yaml
      --set image.repository="docker.io/$IMAGE_NAME"
      --set image.tag="$CI_COMMIT_SHORT_SHA"
      --set service.nodeport="$NODEPORT"
      --wait

# -----------------------------------------------------------------------------
# 5) DÉPLOIEMENTS automatiques : dev -> qa -> staging
# -----------------------------------------------------------------------------
deploy_dev:
  <<: *deploy_template
  stage: deploy_dev
  variables:
    NAMESPACE: dev
    NODEPORT: $NODEPORT_DEV
  environment:
    name: dev
    url: http://$CLUSTER_IP:$NODEPORT_DEV

deploy_qa:
  <<: *deploy_template
  stage: deploy_qa
  variables:
    NAMESPACE: qa
    NODEPORT: $NODEPORT_QA
  environment:
    name: qa
    url: http://$CLUSTER_IP:$NODEPORT_QA

deploy_staging:
  <<: *deploy_template
  stage: deploy_staging
  variables:
    NAMESPACE: staging
    NODEPORT: $NODEPORT_STAGING
  environment:
    name: staging
    url: http://$CLUSTER_IP:$NODEPORT_STAGING

# -----------------------------------------------------------------------------
# 6) DÉPLOIEMENT PRODUCTION : MANUEL et UNIQUEMENT sur la branche main
#    -> la combinaison rules + when:manual répond aux deux exigences de l'énoncé.
# -----------------------------------------------------------------------------
deploy_prod:
  <<: *deploy_template
  stage: deploy_prod
  variables:
    NAMESPACE: prod
    NODEPORT: $NODEPORT_PROD
  environment:
    name: prod
    url: http://$CLUSTER_IP:$NODEPORT_PROD
  rules:
    # Le job n'apparaît QUE sur la branche main, et reste à déclencher à la main.
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
