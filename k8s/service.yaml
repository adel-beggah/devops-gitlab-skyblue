# Manifeste SERVICE — expose le déploiement.
# docker-compose : ports "80:80" (publication hôte)  ==>  Service NodePort.
# Le NodePort rend l'app joignable depuis l'extérieur via http://<IP_NOEUD>:<nodePort>.
apiVersion: v1
kind: Service
metadata:
  name: fastapi
  labels:
    app: fastapi
spec:
  type: NodePort
  selector:
    app: fastapi
  ports:
    - name: http
      port: 80          # port du Service dans le cluster
      targetPort: 80    # port du conteneur
      nodePort: 30000   # port exposé sur le nœud (dev=30000, qa=30001, staging=30002, prod=30003)
      protocol: TCP
